<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Antheiafit · Inventory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a7a4a;--green-light:#22a05a;--green-bg:#e8f5ee;--green-text:#0f5a33;
  --sidebar:#1c1e20;--bg:#f0efec;--surface:#fff;--border:#e2e0db;
  --text:#1a1916;--muted:#6b6860;--hint:#a09d99;
  --amber:#c8860a;--amber-bg:#fdf3dc;--amber-t:#7a4f00;
  --red:#c0392b;--red-bg:#fdf0ee;--red-t:#7b1e1e;
  --r:6px;--rl:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.45}
#root{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:48px;min-height:100vh;background:var(--sidebar);display:flex;flex-direction:column;align-items:center;padding:10px 0;position:fixed;top:0;left:0;bottom:0;z-index:20}
.sidebar-logo{width:30px;height:30px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;cursor:pointer;flex-shrink:0}
.nav-icon{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#7a7876;position:relative;margin-bottom:2px;transition:background .12s}
.nav-icon:hover{background:#2a2d30;color:#c8c6c2}
.nav-icon.active{background:var(--green);color:#fff}
.nav-icon svg{width:15px;height:15px}
.tooltip{position:absolute;left:46px;background:#111;color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;z-index:100;border:1px solid #333}
.nav-icon:hover .tooltip{opacity:1}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:6px;padding-bottom:4px}
.sync-btn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:#6b6860;padding:5px;border-radius:6px}
.sync-btn:hover{color:#c8c6c2;background:#2a2d30}
.sync-btn svg{width:13px;height:13px}
.sync-btn span{font-size:9px;text-align:center;line-height:1.2;max-width:40px}
.account{width:26px;height:26px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6b6860}
.account:hover{background:#444;color:#c8c6c2}

/* MAIN */
main{margin-left:48px;flex:1;min-width:0;display:flex;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;height:42px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;flex-shrink:0}
.page-title{font-size:15px;font-weight:600}
.wh-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-size:12px;cursor:pointer;color:var(--green-text);font-weight:500;font-family:inherit}
.wh-btn:hover{border-color:var(--green)}
.ml-auto{margin-left:auto}
.date-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:2px solid var(--green);background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:var(--green);font-family:inherit}
.filter-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12px;cursor:pointer;color:var(--muted);font-family:inherit}
.filter-pill:hover{border-color:var(--green);color:var(--green)}

/* DROPDOWN */
.dropdown{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:50;min-width:180px;overflow:hidden}
.dropdown-item{padding:9px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.dropdown-item:hover{background:var(--bg)}
.dropdown-item.active{color:var(--green);font-weight:500}

/* PAGE */
.page{padding:18px;flex:1;overflow-y:auto}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.card-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:12px}

/* KPI rows */
.kpi-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px dashed var(--border)}
.kpi-row:last-child{border-bottom:none}
.kpi-label{font-size:12px;color:var(--muted)}
.kpi-value{font-size:13px;font-weight:500}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;font-weight:500;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th.sort-active{color:var(--green)}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.row-hover:hover td{background:#f8f7f5;cursor:pointer}
tr.row-sel td{background:#f0fdf4}
.totals td{font-weight:600;background:#f8f7f5!important;border-top:2px solid var(--border)}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.b-open{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.b-draft{background:#f1f0ed;color:var(--muted);border:1px solid var(--border)}
.b-received{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}

/* ALERT DOT */
.al{width:14px;height:14px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.al-red{background:#fee2e2;color:#dc2626}
.al-orange{background:#ffedd5;color:#ea580c}

/* PRODUCT LINK */
.plink{color:var(--green);font-weight:500}

/* BUTTONS */
button,a.btn{font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border-radius:20px;font-size:12px}
.btn{border:1px solid var(--border);padding:5px 13px;background:#fff;color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{background:var(--green-light)}
.btn-outline{border-color:var(--green);color:var(--green);background:#fff}
.btn-outline:hover{background:var(--green-bg)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:11px}

/* ACTION BAR */
.action-bar{padding:10px 18px;background:#fff;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}

/* INPUTS */
input,select,textarea{border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:12px;font-family:inherit;background:#fff;color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(26,122,74,.08)}
.inp-sm{width:52px;text-align:center;padding:3px 5px;font-size:11px}

/* RECEIVE */
.recv-arrow{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--green);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--green);font-size:12px}
.recv-arrow:hover{background:var(--green);color:#fff}

/* EMPTY */
.empty{text-align:center;padding:48px;color:var(--muted)}

/* MISC */
.mono{font-family:monospace;font-size:11px;color:var(--hint)}
.sect-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.spin-dark{border-color:rgba(0,0,0,.1);border-top-color:var(--green)}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:var(--rl);width:min(540px,96vw);max-height:88vh;overflow-y:auto;padding:18px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-hd h3{font-size:14px;font-weight:600}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-field{display:flex;flex-direction:column;gap:3px}
.form-field label{font-size:11px;color:var(--muted);font-weight:500}
.form-field input,.form-field select,.form-field textarea{width:100%}
.pg-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px}
.pg-btn:hover{background:var(--bg)}

/* PO HEADER */
.po-meta{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;flex-shrink:0}
.po-field{display:flex;flex-direction:column;gap:3px}
.po-field label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.po-actions{margin-left:auto;display:flex;align-items:center;gap:6px}

/* GROUP TABS */
.group-tabs{display:flex;gap:3px;align-items:center}
.gtab{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:11px;cursor:pointer;color:var(--muted);font-family:inherit}
.gtab:hover{border-color:var(--green);color:var(--green)}
.gtab.active{background:var(--green);color:#fff;border-color:var(--green)}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:14px}
.donut-kpis{flex:1}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef,Fragment}=React;
const API="/api";
const fmtEur=n=>n?`€${Math.round(n).toLocaleString("nl-NL")}`:"€0";
const fmtDays=n=>n>=9999?"∞":`${Math.round(n)}d`;
const fmtN=n=>typeof n==="number"?n.toLocaleString("nl-NL"):n||"—";
const api=async(path,method="GET",body)=>{
  const r=await fetch(API+path,{method,headers:{"Content-Type":"application/json"},body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
};
function useSort(init){
  const [s,setS]=useState({field:init,dir:"asc"});
  const toggle=f=>setS(p=>({field:f,dir:p.field===f&&p.dir==="asc"?"desc":"asc"}));
  const sorted=arr=>[...arr].sort((a,b)=>{const v=s.dir==="asc"?1:-1;const av=a[s.field]??0,bv=b[s.field]??0;return av>bv?v:av<bv?-v:0;});
  return [s,toggle,sorted];
}

// SVG Icons
const I={
  grid:<svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>,
  rep:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5"/><polyline points="13.5,1 13.5,5 9.5,5"/></svg>,
  forecast:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><polyline points="2,12 5,8 8,10 13,4"/><polyline points="10,4 13,4 13,7"/></svg>,
  orders:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 2h10l1.5 3.5v8H1.5V5.5z"/><line x1="1.5" y1="5.5" x2="14.5" y2="5.5"/><line x1="8" y1="8" x2="8" y2="12"/><line x1="6" y1="10" x2="10" y2="10"/></svg>,
  overstock:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="2" y="8" width="12" height="6" rx="1"/><path d="M4 8V5a4 4 0 0 1 8 0v3"/></svg>,
  reports:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="2" y="1" width="12" height="14" rx="1"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="8" y2="11"/></svg>,
  sync:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M14 8A6 6 0 1 1 8.5 2"/><polyline points="14,2 14,6 10,6"/></svg>,
  cal:<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.3"><rect x="1" y="2" width="12" height="11" rx="1"/><line x1="1" y1="6" x2="13" y2="6"/><line x1="4" y1="0.5" x2="4" y2="4"/><line x1="10" y1="0.5" x2="10" y2="4"/></svg>,
  filter:<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.3"><line x1="1" y1="3" x2="13" y2="3"/><line x1="3" y1="7" x2="11" y2="7"/><line x1="5" y1="11" x2="9" y2="11"/></svg>,
  caret:<svg viewBox="0 0 10 6" fill="none" stroke="currentColor" strokeWidth="1.5"><polyline points="1,1 5,5 9,1"/></svg>,
  arr:<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="1" y1="6" x2="11" y2="6"/><polyline points="7,2 11,6 7,10"/></svg>,
  plus:<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.8"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>,
  user:<svg viewBox="0 0 14 14" fill="currentColor"><circle cx="7" cy="5" r="3"/><path d="M1 13c0-3.3 2.7-6 6-6s6 2.7 6 6" fillOpacity=".8"/></svg>,
  check:<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="1,6 4,10 11,2"/></svg>,
};

function Sidebar({page,setPage,lastSync,onSync,loading}){
  const nav=[
    {id:"overview",icon:I.grid,label:"Overview"},
    {id:"replenishment",icon:I.rep,label:"Replenishment"},
    {id:"forecast",icon:I.forecast,label:"Edit forecast"},
    {id:"stock-orders",icon:I.orders,label:"Stock orders"},
    {id:"overstock",icon:I.overstock,label:"Overstock"},
    {id:"reports",icon:I.reports,label:"Reports"},
  ];
  const syncLabel=loading?"syncing":lastSync?`${Math.round((Date.now()-lastSync)/60000)}m ago`:"sync";
  return React.createElement("div",{className:"sidebar"},
    React.createElement("div",{className:"sidebar-logo",onClick:()=>setPage("overview")},
      React.createElement("svg",{viewBox:"0 0 20 18",fill:"white",width:18,height:18},
        React.createElement("path",{d:"M10 1L1 6.5l9 5.5 9-5.5L10 1z"}),
        React.createElement("path",{d:"M1 10.5l9 5.5 9-5.5",stroke:"white",strokeWidth:1.5,fill:"none"}),
      )
    ),
    ...nav.map(n=>React.createElement("div",{key:n.id,className:"nav-icon"+(page===n.id?" active":""),onClick:()=>setPage(n.id)},
      n.icon,React.createElement("span",{className:"tooltip"},n.label)
    )),
    React.createElement("div",{className:"sidebar-bottom"},
      React.createElement("div",{className:"sync-btn",onClick:onSync,title:"Sync Shopify"},
        loading?React.createElement("span",{className:"spin spin-dark",style:{borderColor:"rgba(120,120,120,.2)",borderTopColor:"#9a9896"}}):I.sync,
        React.createElement("span",null,syncLabel)
      ),
      React.createElement("div",{className:"account"},I.user)
    )
  );
}

function WHDropdown({warehouse,setWarehouse}){
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const opts=["NSS + Monta","NextSmartShip CN Warehouse","Monta","China warehouse"];
  return React.createElement("div",{style:{position:"relative"},ref},
    React.createElement("button",{className:"wh-btn",onClick:()=>setOpen(v=>!v)},warehouse," ",I.caret),
    open&&React.createElement("div",{className:"dropdown"},
      ...opts.map(o=>React.createElement("div",{key:o,className:"dropdown-item"+(o===warehouse?" active":""),onClick:()=>{setWarehouse(o);setOpen(false);}},
        o, o===warehouse&&React.createElement("span",{style:{color:"var(--green)",fontSize:11}},I.check)
      ))
    )
  );
}

function Topbar({title,warehouse,setWarehouse,dateLabel,extra}){
  return React.createElement("div",{className:"topbar"},
    React.createElement("span",{className:"page-title"},title),
    React.createElement(WHDropdown,{warehouse,setWarehouse}),
    extra||null,
    React.createElement("div",{className:"ml-auto",style:{display:"flex",gap:8}},
      React.createElement("button",{className:"filter-pill"},I.filter," Filters"),
      dateLabel&&React.createElement("button",{className:"date-pill"},I.cal," ",dateLabel)
    )
  );
}

// ── DONUT ────────────────────────────────────────────────────────────────
function Donut({label,size=72}){
  const r=26,c=2*Math.PI*r,frac=0.75;
  return React.createElement("svg",{width:size,height:size,viewBox:"0 0 66 66",style:{flexShrink:0}},
    React.createElement("circle",{cx:33,cy:33,r,fill:"none",stroke:"#e2e0db",strokeWidth:7}),
    React.createElement("circle",{cx:33,cy:33,r,fill:"none",stroke:"var(--green)",strokeWidth:7,strokeDasharray:`${c*frac} ${c*(1-frac)}`,strokeLinecap:"round",transform:"rotate(-90 33 33)"}),
    React.createElement("text",{x:33,y:30,textAnchor:"middle",fontSize:8,fill:"var(--muted)"},"unknown"),
    React.createElement("text",{x:33,y:41,textAnchor:"middle",fontSize:11,fontWeight:600,fill:"var(--text)"},label)
  );
}

// ── OVERVIEW ─────────────────────────────────────────────────────────────
function Overview({inventory,analytics,pos,onNav}){
  if(!inventory)return React.createElement("div",{className:"empty"},"Klik sync om te beginnen");
  const {skus,meta}=inventory;
  const crit=skus.filter(s=>s.status==="critical");
  const warn=skus.filter(s=>s.status==="warning");
  const topR=[...crit,...warn].slice(0,5);
  const topS=(analytics?.topSellers||[]).slice(0,5);
  const openPOs=pos.filter(p=>p.status==="ordered");
  const overstock=skus.filter(s=>s.daysLeft>120&&s.stock>0);
  const totalOnOrder=openPOs.reduce((s,p)=>(p.items||[]).reduce((a,i)=>a+i.qty,0)+s,0);
  const totalPOCost=openPOs.reduce((s,p)=>s+(p.totalCost||0),0);

  const KR=({l,v})=>React.createElement("div",{className:"kpi-row"},
    React.createElement("span",{className:"kpi-label"},l),
    React.createElement("span",{className:"kpi-value"},v)
  );

  return React.createElement("div",{className:"page"},
    // Row 1: Stock + Purchases
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}},
      React.createElement("div",{className:"card"},
        React.createElement("div",{className:"card-title"},"Stock"),
        React.createElement("div",{className:"donut-wrap"},
          React.createElement("div",{className:"donut-kpis"},
            React.createElement(KR,{l:"Variants",v:meta.totalSkus}),
            React.createElement(KR,{l:"Variants in stock",v:skus.filter(s=>s.stock>0).length}),
            React.createElement(KR,{l:"Stock units",v:fmtN(skus.reduce((s,k)=>s+k.stock,0))}),
            React.createElement(KR,{l:"Stock cost",v:fmtEur(analytics?.totalValue||0)}),
          ),
          React.createElement(Donut,{label:fmtEur(analytics?.totalValue||0)})
        )
      ),
      React.createElement("div",{className:"card"},
        React.createElement("div",{className:"card-title"},"Purchases"),
        React.createElement("div",{className:"donut-wrap"},
          React.createElement("div",{className:"donut-kpis"},
            React.createElement(KR,{l:"Active purchase orders",v:openPOs.length}),
            React.createElement(KR,{l:"Overdue purchase orders",v:0}),
            React.createElement(KR,{l:"On order units",v:fmtN(totalOnOrder)}),
            React.createElement(KR,{l:"On order cost",v:fmtEur(totalPOCost)}),
          ),
          React.createElement(Donut,{label:fmtEur(totalPOCost)})
        ),
        React.createElement("div",{style:{marginTop:10,textAlign:"right"}},
          React.createElement("button",{className:"btn btn-outline btn-sm",onClick:()=>onNav("stock-orders")},"Purchase orders")
        )
      )
    ),
    // Row 2: Top replenish + Replenishment KPIs + Forecast
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 280px",gap:12,marginBottom:12}},
      React.createElement("div",{className:"card"},
        React.createElement("div",{className:"card-title"},"Top variants to replenish"),
        React.createElement("table",null,
          React.createElement("thead",null,React.createElement("tr",null,
            React.createElement("th",null,"#"),React.createElement("th",null,"Title"),
            React.createElement("th",{style:{textAlign:"right"}},"Stock"),
            React.createElement("th",{style:{textAlign:"right"}},"Replenish"),
            React.createElement("th",{style:{textAlign:"right"}},"Cost"),
          )),
          React.createElement("tbody",null,
