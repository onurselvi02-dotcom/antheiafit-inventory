<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Antheiafit · Inventory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f1;--surface:#fff;--border:#e5e3de;
  --text:#1a1916;--muted:#6b6860;--hint:#a09d99;
  --green:#1D9E75;--green-bg:#e1f5ee;--green-t:#0F6E56;
  --amber:#c8860a;--amber-bg:#fdf3dc;--amber-t:#7a4f00;
  --red:#c0392b;--red-bg:#fdf0ee;--red-t:#7b1e1e;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-t:#1e3a8a;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-t:#4c1d95;
  --r:8px;--rl:12px;--nav:220px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
#root{display:flex;min-height:100vh}
nav{width:var(--nav);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:1.25rem 0;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:10}
.nav-logo{padding:0 1.25rem 1rem;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.nav-logo h1{font-size:15px;font-weight:700} .nav-logo p{font-size:11px;color:var(--muted);margin-top:1px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 1.25rem;font-size:13px;color:var(--muted);cursor:pointer;border-left:2px solid transparent}
.nav-item:hover{background:var(--bg);color:var(--text)} .nav-item.active{color:var(--text);font-weight:500;border-left-color:var(--text);background:var(--bg)}
.nav-section{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--hint);padding:.875rem 1.25rem .25rem}
.nav-bottom{margin-top:auto;padding:.875rem 1.25rem 0;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.sync-btn{width:100%;padding:8px;font-size:12px;background:var(--text);color:#fff;border:none;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit}
.sync-btn:hover{opacity:.85} .sync-btn:disabled{opacity:.4;cursor:not-allowed}
.claude-nav-btn{width:100%;padding:8px;font-size:12px;background:var(--purple);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.claude-nav-btn:hover{opacity:.88}
main{margin-left:var(--nav);flex:1;padding:2rem;min-width:0}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem}
.page-header h2{font-size:18px;font-weight:700} .page-header p{font-size:12px;color:var(--muted);margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:1.125rem}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:2px} .metric-value{font-size:22px;font-weight:700} .metric-sub{font-size:11px;color:var(--muted);margin-top:2px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-weight:500;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle} tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer} tr.clickable:hover td{background:var(--bg)} tr.selected td{background:var(--blue-bg)}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;white-space:nowrap}
.badge-ok{background:var(--green-bg);color:var(--green-t)} .badge-warn{background:var(--amber-bg);color:var(--amber-t)}
.badge-crit{background:var(--red-bg);color:var(--red-t)} .badge-b{background:#f1f0ed;color:var(--muted)}
.badge-A{background:#fff8e6;color:#7a4f00;border:1px solid #f5d98a} .badge-B{background:#f0eeeb;color:var(--muted);border:1px solid var(--border)}
.badge-draft{background:#f1f0ed;color:var(--muted)} .badge-ordered{background:var(--blue-bg);color:var(--blue-t)} .badge-received{background:var(--green-bg);color:var(--green-t)}
button{font-family:inherit;font-size:13px;cursor:pointer}
.btn{border:1px solid var(--border);border-radius:var(--r);padding:7px 14px;background:var(--surface);color:var(--text)}
.btn:hover{background:var(--bg)} .btn-primary{background:var(--text);color:#fff;border-color:var(--text)} .btn-primary:hover{opacity:.88}
.btn-sm{padding:4px 10px;font-size:12px} .btn-danger{color:var(--red)} .btn-danger:hover{background:var(--red-bg)}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)} .btn-purple:hover{opacity:.88}
label.fl{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
input,select,textarea{border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px} .form-row.three{grid-template-columns:1fr 1fr 1fr} .field{margin-bottom:12px}
.alert-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--r);margin-bottom:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--surface);border-radius:var(--rl);width:min(700px,96vw);max-height:90vh;overflow-y:auto;padding:1.5rem}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-header h3{font-size:16px;font-weight:700}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.spin-dark{border-color:rgba(0,0,0,.15);border-top-color:var(--blue)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:13px}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.flex{display:flex;align-items:center;gap:8px} .mono{font-family:monospace;font-size:11px;color:var(--hint)}
.error-box{background:var(--red-bg);border:1px solid #f5b8b3;border-radius:var(--r);padding:1rem;color:var(--red-t);font-size:13px;margin-bottom:1.25rem}

/* Claude panel */
.claude-panel{position:fixed;right:0;top:0;bottom:0;width:420px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:50;transform:translateX(100%);transition:transform .2s}
.claude-panel.open{transform:translateX(0)}
.claude-panel-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.claude-panel-header h3{font-size:14px;font-weight:700;color:var(--purple-t)}
.claude-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:12px}
.msg{max-width:90%;border-radius:var(--rl);padding:.75rem 1rem;font-size:13px;line-height:1.6;white-space:pre-wrap}
.msg-user{background:var(--purple);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-claude{background:var(--bg);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg-claude strong{font-weight:600}
.claude-input-row{padding:1rem;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.claude-presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.preset-btn{font-size:11px;padding:4px 10px;background:var(--purple-bg);color:var(--purple-t);border:1px solid #d9d3fa;border-radius:20px;cursor:pointer;font-family:inherit}
.preset-btn:hover{background:#ede9fe}
.claude-textarea-row{display:flex;gap:8px}
.claude-textarea-row textarea{flex:1;resize:none;font-size:13px;padding:8px 10px;border-radius:var(--r)}
.send-btn{padding:8px 14px;background:var(--purple);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-family:inherit;font-size:13px;align-self:flex-end;flex-shrink:0}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body><div id="root"></div>
<script>
const {useState,useEffect,useMemo,useCallback,useRef,Fragment}=React;

const API="http://localhost:3000/api";

const fmtEur=n=>n?`€${Math.round(n).toLocaleString("nl-NL")}`:"€0";
const fmtDays=n=>n>=9999?"∞":`${Math.round(n)}d`;
const api=async(path,method="GET",body)=>{
  const r=await fetch(API+path,{method,headers:{"Content-Type":"application/json"},body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
};
function useSort(init){
  const [s,setS]=useState({field:init,dir:"asc"});
  const toggle=f=>setS(p=>({field:f,dir:p.field===f&&p.dir==="asc"?"desc":"asc"}));
  const sorted=arr=>[...arr].sort((a,b)=>{const v=s.dir==="asc"?1:-1;return(a[s.field]??0)>(b[s.field]??0)?v:-v;});
  return [s,toggle,sorted];
}
function ColH({label,field,sort,onSort}){
  return React.createElement("th",{onClick:()=>onSort(field)},label+(sort?.field===field?(sort.dir==="asc"?" ↑":" ↓"):""));
}
function StatusBadge({status}){
  const m={ok:["badge-ok","In stock"],warning:["badge-warn","Bestel binnenkort"],critical:["badge-crit","BESTEL NU"],"b-stock":["badge-b","B-stock"]};
  const [c,l]=m[status]||["badge-b",status];
  return React.createElement("span",{className:"badge "+c},l);
}
function POBadge({s}){
  const m={draft:["badge-draft","Concept"],ordered:["badge-ordered","Besteld"],received:["badge-received","Ontvangen"]};
  const [c,l]=m[s]||["badge-draft",s];
  return React.createElement("span",{className:"badge "+c},l);
}

// ── Claude analysis panel ─────────────────────────────────────────────────────
function ClaudePanel({open,onClose,inventory,analytics}){
  const [messages,setMessages]=useState([{role:"claude",text:"Hey! Ik heb toegang tot je live inventory data. Stel me een vraag of kies een optie hieronder."}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  const PRESETS=[
    "Welke SKUs moet ik vandaag bestellen?",
    "Maak een inkoopplan voor de komende 3 maanden",
    "Welke producten zijn mijn best-sellers?",
    "Hoeveel cash zit er vast in overstock?",
    "Welke SKUs kan ik als B-stock markeren?",
    "Geef me een management samenvatting",
    "Welke SKUs hebben onvoldoende data voor goede forecast?",
    "Stel optimale MOQ voor per leverancier",
  ];

  const buildContext=()=>{
    if(!inventory)return "Geen inventory data beschikbaar.";
    const {skus,meta}=inventory;
    const critical=skus.filter(s=>s.status==="critical");
    const warning=skus.filter(s=>s.status==="warning");
    const overstock=skus.filter(s=>s.daysLeft>120&&s.stock>0);
    const dead=skus.filter(s=>s.avgDaily===0&&s.stock>0);
    return `# Antheiafit Inventory Data — ${new Date().toLocaleDateString("nl-NL")}

## Meta
- Totaal SKUs: ${meta.totalSkus}
- Orders geanalyseerd: ${meta.ordersAnalyzed} (laatste ${meta.velocityDays} dagen)
- Kritiek (bestel nu): ${meta.critical}
- Warning (bestel binnenkort): ${meta.warning}
- Data opgehaald: ${meta.fetchedAt}

## Kritieke SKUs (bestel nu)
${critical.length===0?"Geen":critical.map(s=>`- ${s.name} ${s.variant} | SKU: ${s.sku} | Stock: ${s.stock} (+${s.transit} onderweg) | ${fmtDays(s.daysLeft)} over | Vel: ${s.avgDaily}/dag | Bestel: ${s.suggestQty} | Leverancier: ${s.supplier}`).join("\n")}

## Warning SKUs (bestel binnenkort)
${warning.length===0?"Geen":warning.map(s=>`- ${s.name} ${s.variant} | SKU: ${s.sku} | Stock: ${s.stock} | ${fmtDays(s.daysLeft)} over | Vel: ${s.avgDaily}/dag | Bestel: ${s.suggestQty}`).join("\n")}

## Overstock (>120 dagen voorraad)
${overstock.length===0?"Geen":overstock.map(s=>`- ${s.name} ${s.variant} | Stock: ${s.stock} | ${fmtDays(s.daysLeft)} | Waarde: ${fmtEur(s.stock*s.costPrice)}`).join("\n")}

## Dead stock (0 verkopen)
${dead.length===0?"Geen":dead.map(s=>`- ${s.name} ${s.variant} | Stock: ${s.stock}`).join("\n")}

## Alle SKUs
${skus.map(s=>`${s.name} | ${s.variant} | SKU:${s.sku} | Klasse:${s.stockClass} | Stock:${s.stock} | Transit:${s.transit} | Vel:${s.avgDaily}/d | Verkocht(${meta.velocityDays}d):${s.unitsSold} | Dagen:${fmtDays(s.daysLeft)} | Reorder@${s.reorderAt} | Bestel:${s.suggestQty} | Kostprijs:${fmtEur(s.costPrice)} | Lever:${s.supplier} | Status:${s.status}`).join("\n")}

## Analytics
${analytics?`- Totale voorraadwaarde: ${fmtEur(analytics.totalValue)}
- Overstock waarde: ${fmtEur(analytics.overstockValue)}
- Dead stock SKUs: ${analytics.deadSkus}
- A-stock: ${analytics.aStock} | B-stock: ${analytics.bStock}
- Top sellers: ${(analytics.topSellers||[]).slice(0,5).map(s=>`${s.name} ${s.variant} (${s.avgDaily}/dag)`).join(", ")}
- Per leverancier: ${Object.entries(analytics.bySupplier||{}).map(([n,v])=>`${n}: ${v.skus} SKUs, ${fmtEur(v.value)}`).join(" | ")}`:"Niet geladen"}`;
  };

  const send=async(text)=>{
    const q=text||input.trim();
    if(!q||loading)return;
    setInput("");
    setMessages(p=>[...p,{role:"user",text:q}]);
    setLoading(true);
    try{
      const context=buildContext();
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:`Je bent een inventory management expert voor Antheiafit, een premium activewear merk gevestigd in Amsterdam dat produceert in China (Fujian). Je krijgt live inventory data en beantwoordt vragen in het Nederlands. Wees concreet, geef specifieke aantallen en SKU namen. Gebruik geen bullet points tenzij het echt een lijst is. Geef altijd actionable advies.

${context}`,
          messages:[...messages.filter(m=>m.role!=="claude"||messages.indexOf(m)>0).map(m=>({role:m.role==="claude"?"assistant":"user",content:m.text})),{role:"user",content:q}]
        })
      });
      const data=await res.json();
      const reply=data.content?.[0]?.text||"Geen antwoord ontvangen.";
      setMessages(p=>[...p,{role:"claude",text:reply}]);
    }catch(e){
      setMessages(p=>[...p,{role:"claude",text:`Fout: ${e.message}`}]);
    }finally{setLoading(false);}
  };

  return React.createElement("div",{className:"claude-panel"+(open?" open":"")},
    React.createElement("div",{className:"claude-panel-header"},
      React.createElement("h3",null,"✦ Claude — Inventory Analyst"),
      React.createElement("button",{className:"btn btn-sm",onClick:onClose},"✕")
    ),
    React.createElement("div",{className:"claude-messages"},
      ...messages.map((m,i)=>React.createElement("div",{key:i,className:`msg msg-${m.role}`},m.text)),
      loading&&React.createElement("div",{className:"msg msg-claude",style:{display:"flex",alignItems:"center",gap:8,color:"var(--muted)"}},
        React.createElement("span",{className:"spin spin-dark",style:{borderTopColor:"var(--purple)"}}),
        "Analyseer data..."
      ),
      React.createElement("div",{ref:bottomRef})
    ),
    React.createElement("div",{className:"claude-input-row"},
      React.createElement("div",{className:"claude-presets"},
        ...PRESETS.map((p,i)=>React.createElement("button",{key:i,className:"preset-btn",onClick:()=>send(p)},p))
      ),
      React.createElement("div",{className:"claude-textarea-row"},
        React.createElement("textarea",{rows:2,value:input,onChange:e=>setInput(e.target.value),
          placeholder:"Stel een vraag over je inventory...",
          onKeyDown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}),
        React.createElement("button",{className:"send-btn",onClick:()=>send(),disabled:loading||!input.trim()},
          loading?React.createElement("span",{className:"spin"}):">")
      )
    )
  );
}

// ── Forecast chart ────────────────────────────────────────────────────────────
function ForecastChart({item,onClose}){
  const days=[0,15,30,45,60,75,90];
  const max=item.stock;
  return React.createElement("div",{style:{background:"var(--blue-bg)",borderRadius:"var(--r)",padding:"12px 16px 14px",marginBottom:12}},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:10}},
      React.createElement("span",{style:{fontWeight:600,fontSize:13}},`${item.name} · ${item.variant} — 90d forecast`),
      React.createElement("button",{className:"btn btn-sm",onClick:onClose},"✕")
    ),
    React.createElement("div",{style:{display:"flex",alignItems:"flex-end",gap:4,height:80,marginBottom:6}},
      ...days.map(d=>{
        const stock=Math.max(0,Math.round(item.stock-item.avgDaily*d));
        const pct=max>0?stock/max:0;
        const isRed=stock<=item.reorderAt;
        return React.createElement("div",{key:d,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}},
          React.createElement("div",{style:{width:"100%",height:Math.round(pct*70)+2,background:isRed?"#E24B4A":"#2563eb",borderRadius:2,minHeight:2}}),
          React.createElement("span",{style:{fontSize:9,color:"var(--muted)"}},`${d}d`)
        );
      })
    ),
    React.createElement("div",{style:{display:"flex",gap:16,fontSize:11,color:"var(--blue-t)"}},
      React.createElement("span",null,`Stock: ${item.stock}`),
      item.transit>0&&React.createElement("span",{style:{color:"var(--green-t)"}},`+${item.transit} onderweg`),
      React.createElement("span",null,`Vel: ${item.avgDaily}/dag`),
      React.createElement("span",null,`Reorder bij: ${item.reorderAt}`),
      React.createElement("span",{style:{color:"#E24B4A"}},`Rood = onder reorder punt`)
    )
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({inventory,analytics,pos,onNav,onClaude}){
  if(!inventory)return React.createElement("div",{className:"empty"},"Klik Sync Shopify om te starten");
  const {skus,meta}=inventory;
  const crit=skus.filter(s=>s.status==="critical");
  const warn=skus.filter(s=>s.status==="warning");
  const openPOs=pos.filter(p=>p.status==="ordered");
  return React.createElement("div",null,
    React.createElement("div",{className:"metric-grid"},
      ...[
        {l:"SKUs",v:meta.totalSkus},
        {l:"Bestel NU",v:crit.length,c:crit.length>0?"var(--red)":null},
        {l:"Binnenkort",v:warn.length,c:warn.length>0?"var(--amber)":null},
        {l:"Open PO's",v:openPOs.length,c:openPOs.length>0?"var(--blue)":null},
        {l:"Voorraadwaarde",v:fmtEur(analytics?.totalValue||0)},
        {l:"Overstock",v:fmtEur(analytics?.overstockValue||0),c:analytics?.overstockValue>0?"var(--amber)":null},
      ].map((k,i)=>React.createElement("div",{key:i,className:"metric"},
        React.createElement("div",{className:"metric-label"},k.l),
        React.createElement("div",{className:"metric-value",style:{color:k.c||"var(--text)"}},k.v)
      ))
    ),
    React.createElement("button",{className:"btn btn-purple",style:{marginBottom:"1.25rem"},onClick:onClaude},
      "✦ Vraag Claude om een analyse"),
    crit.length>0&&React.createElement("div",{style:{marginBottom:"1.25rem"}},
      React.createElement("div",{className:"section-title"},"Bestel nu"),
      ...crit.map(s=>React.createElement("div",{key:s.id,className:"alert-row",style:{background:"var(--red-bg)"}},
        React.createElement("div",null,
          React.createElement("span",{style:{fontWeight:600,color:"var(--red-t)"}},[s.name,s.variant].join(" · ")),
          React.createElement("span",{style:{fontSize:11,color:"var(--red-t)",marginLeft:8}},`${fmtDays(s.daysLeft)} over · ${s.avgDaily}/dag`)
        ),
        React.createElement("div",{className:"flex"},
          React.createElement("strong",{style:{fontSize:13,color:"var(--red-t)"}},`${s.suggestQty} units`),
          React.createElement("button",{className:"btn btn-sm",onClick:()=>onNav("replenishment")},"→")
        )
      ))
    ),
    warn.length>0&&React.createElement("div",{style:{marginBottom:"1.25rem"}},
      React.createElement("div",{className:"section-title"},"Bestel binnenkort"),
      ...warn.slice(0,5).map(s=>React.createElement("div",{key:s.id,className:"alert-row",style:{background:"var(--amber-bg)"}},
        React.createElement("div",null,
          React.createElement("span",{style:{fontWeight:600,color:"var(--amber-t)"}},[s.name,s.variant].join(" · ")),
          React.createElement("span",{style:{fontSize:11,color:"var(--amber-t)",marginLeft:8}},`${fmtDays(s.daysLeft)} over`)
        ),
        React.createElement("strong",{style:{fontSize:13,color:"var(--amber-t)"}},`${s.suggestQty} units`)

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({settings,onSave}){
  const [f,setF]=useState(settings||{velocityDays:90,forecastMethod:"average"});
  const save=async()=>{await api("/settings","POST",f);onSave(f);};
  return React.createElement("div",{style:{maxWidth:500}},
    React.createElement("div",{className:"card"},
      React.createElement("p",{style:{fontWeight:700,marginBottom:"1.25rem"}},"Forecast instellingen"),

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("dashboard");
  const [inventory,setInventory]=useState(null);
  const [analytics,setAnalytics]=useState(null);
  const [suppliers,setSuppliers]=useState([]);
  const [pos,setPOs]=useState([]);
  const [settings,setSettings]=useState({velocityDays:90,forecastMethod:"average"});
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [lastSync,setLastSync]=useState(null);
  const [claudeOpen,setClaudeOpen]=useState(false);

  const loadStatic=useCallback(async()=>{
    const [s,p,cfg]=await Promise.all([api("/suppliers"),api("/purchase-orders"),api("/settings")]);
    setSuppliers(s);setPOs(p);setSettings(cfg);
  },[]);

  const sync=useCallback(async()=>{
    setLoading(true);setError(null);
    try{
      const [inv,an]=await Promise.all([api("/inventory"),api("/analytics")]);
      setInventory(inv);setAnalytics(an);setLastSync(new Date());
      await loadStatic();
    }catch(e){setError(e.message);}finally{setLoading(false);}
  },[loadStatic]);

  const [connected,setConnected]=useState(true);
  useEffect(()=>{
    fetch(API+"/status").then(r=>r.json()).then(d=>{
      setConnected(d.connected);
      if(d.connected){loadStatic();sync();}
    }).catch(()=>{});
  },[]);

  if(!connected) return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16,fontFamily:"var(--font-sans)"}},
    React.createElement("h2",{style:{fontSize:20,fontWeight:700}},"Antheiafit Inventory"),
    React.createElement("p",{style:{color:"var(--muted)"}}, "Koppel je Shopify store om te beginnen"),
    React.createElement("a",{href:"/auth",style:{padding:"10px 24px",background:"#1a1916",color:"#fff",borderRadius:8,textDecoration:"none",fontSize:14}},"Verbind met Shopify")
  );

  const NAV=[
    {id:"dashboard",label:"Dashboard",i:"▦"},
    {id:"replenishment",label:"Replenishment",i:"↺"},
    {id:"purchase-orders",label:"Inkoopopdrachten",i:"📋"},
    {id:"skus",label:"SKU beheer",i:"≡"},
    {id:"suppliers",label:"Leveranciers",i:"🏭"},
    {id:"analytics",label:"Analytics",i:"▲"},
    {id:"settings",label:"Instellingen",i:"⚙"},
  ];
  const TITLES={
    dashboard:["Dashboard","Live overzicht"],
    replenishment:["Replenishment","Actieve bestelsuggesties"],
    "purchase-orders":["Inkoopopdrachten","PO aanmaken en opvolgen"],
    skus:["SKU beheer","A/B stock, kostprijzen, MOQ"],
    suppliers:["Leveranciers","Lead times, safety stock, MOQ"],
    analytics:["Analytics","Voorraadwaarde, top sellers, overstock"],
    settings:["Instellingen","Velocity periode en forecast methode"],
  };
  const [title,sub]=TITLES[page]||["",""];
  const mainStyle={marginLeft:"var(--nav)",flex:1,padding:"2rem",minWidth:0,transition:"margin-right .2s",marginRight:claudeOpen?420:0};

  return React.createElement("div",null,
    React.createElement("nav",null,
      React.createElement("div",{className:"nav-logo"},
        React.createElement("h1",null,"Antheiafit"),
        React.createElement("p",null,"Inventory Forecast")
      ),
      ...NAV.map(n=>React.createElement("div",{key:n.id,className:"nav-item"+(page===n.id?" active":""),onClick:()=>setPage(n.id)},
        React.createElement("span",{style:{fontSize:13}},n.i),n.label
      )),
      React.createElement("div",{className:"nav-bottom"},
        lastSync&&React.createElement("p",{style:{fontSize:10,color:"var(--muted)",textAlign:"center"}},
          `Sync: ${lastSync.toLocaleTimeString("nl-NL")}`),
        React.createElement("button",{className:"claude-nav-btn",onClick:()=>setClaudeOpen(v=>!v)},
          "✦",claudeOpen?"Claude sluiten":"Vraag Claude"),
        React.createElement("button",{className:"sync-btn",onClick:sync,disabled:loading},
          loading?React.createElement("span",{className:"spin"}):null,
          loading?"Syncing...":"↺ Sync Shopify")
      )
    ),
    React.createElement("main",{style:mainStyle},
      React.createElement("div",{className:"page-header"},
        React.createElement("div",null,React.createElement("h2",null,title),React.createElement("p",null,sub)),
        inventory&&React.createElement("p",{style:{fontSize:11,color:"var(--muted)"}},
          `${inventory.meta?.totalSkus||0} SKUs · ${inventory.meta?.ordersAnalyzed} orders (${inventory.meta?.velocityDays}d, alle locaties gecombineerd)`)
      ),
      error&&React.createElement("div",{className:"error-box"},React.createElement("strong",null,"Fout: "),error),
      page==="dashboard"&&React.createElement(Dashboard,{inventory,analytics,pos,onNav:setPage,onClaude:()=>setClaudeOpen(true)}),
      page==="replenishment"&&React.createElement(Replenishment,{inventory,suppliers,onPOCreated:loadStatic}),
      page==="purchase-orders"&&React.createElement(PurchaseOrders,{pos,onRefresh:loadStatic}),
      page==="skus"&&React.createElement(SKUManager,{inventory,onRefresh:sync}),
      page==="suppliers"&&React.createElement(Suppliers,{suppliers,onRefresh:loadStatic}),
      page==="analytics"&&React.createElement(Analytics,{analytics,inventory}),
      page==="settings"&&React.createElement(Settings,{settings,onSave:setSettings})
    ),
    React.createElement(ClaudePanel,{open:claudeOpen,onClose:()=>setClaudeOpen(false),inventory,analytics})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
